<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyna Micro Stock Monitoring</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1>📦 DynaMicro Stock Monitoring</h1>
        </div>
    </header>

    <main class="container">
        <section class="dashboard">
            <div class="card widget">
                <h3>Total Items</h3>
                <p id="total-items">0</p>
            </div>
            <div class="card widget">
                <h3>Total Value</h3>
                <p id="total-value">$0.00</p>
            </div>
            <div class="card widget alert-widget">
                <h3>Low Stock Alerts</h3>
                <p id="low-stock">0</p>
            </div>
        </section>

        <div class="main-grid">
            <section class="form-section card">
                <h2 id="form-title">Add New Item</h2>
                <form id="inventory-form">
                    <input type="hidden" id="item-id">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" required placeholder="e.g. Wireless Mouse">
                    </div>
                    <div class="form-group">
                        <label for="item-sku">Stock Code</label>
                        <input type="text" id="item-sku" placeholder="e.g. WM-001 (Optional)">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="item-qty">Quantity</label>
                            <input type="number" id="item-qty" required min="0" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label for="item-price">Unit Price</label>
                            <input type="number" id="item-price" min="0" step="0.01" placeholder="0.00 (Optional)">
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" class="btn btn-primary">Add to Inventory</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary hidden">Cancel Edit</button>
                </form>
            </section>

            <div class="tables-container">
                <section class="table-section card" style="margin-bottom: 2rem;">
                    <div class="table-header">
                        <h2>Current Stock</h2>
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="Search by name or Stock Code...">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table id="inventory-table">
                            <thead>
                                <tr>
                                    <th>Stock Code</th>
                                    <th>Name</th>
                                    <th>Qty</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                </tbody>
                        </table>
                    </div>
                </section>

                <section class="table-section card history-section">
                    <div class="table-header">
                        <h2>Recent Withdrawals</h2>
                        <button class="btn btn-small btn-secondary" id="clear-history-btn" style="margin: 0;">Clear History</button>
                    </div>
                    <div class="table-responsive">
                        <table id="history-table">
                            <thead>
                                <tr>
                                    <th>Date & Time</th>
                                    <th>Item Name</th>
                                    <th>Stock Code</th>
                                    <th>Qty Withdrawn</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body">
                                </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="withdraw-modal" class="modal hidden">
        <div class="modal-content card">
            <div class="modal-header">
                <h2>Withdraw Stock</h2>
                <span class="close-btn" id="close-modal">&times;</span>
            </div>
            <p id="withdraw-item-name" style="margin-bottom: 1rem; font-weight: bold; color: var(--primary-color);"></p>
            <form id="withdraw-form">
                <input type="hidden" id="withdraw-item-id">
                <div class="form-group">
                    <label for="withdraw-qty">Quantity to Withdraw</label>
                    <input type="number" id="withdraw-qty" required min="1" placeholder="Enter amount">
                </div>
                <p id="current-qty-display" style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-muted);"></p>
                <button type="submit" class="btn btn-withdraw-confirm">Confirm Withdrawal</button>
                <button type="button" class="btn btn-secondary" id="cancel-withdraw-btn">Cancel</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
